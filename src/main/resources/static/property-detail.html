<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <title>NEXUS - Λεπτομέρειες Ακινήτου</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Leaflet CSS for Map -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    body { background-color: #f3f4f6; }
    .gallery-container { display: grid; grid-template-columns: 2fr 1fr; grid-template-rows: 250px 250px; gap: 10px; padding: 2rem 5%; margin-top: 1rem; }
    .gallery-item { background: #e5e7eb; border-radius: 12px; overflow: hidden; position: relative; }
    .gallery-item img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s; }
    .gallery-item:hover img { transform: scale(1.05); }
    .item-main { grid-row: span 2; }
    .item-more { display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.5); color: white; position: absolute; inset: 0; font-size: 1.5rem; font-weight: bold; cursor: pointer; opacity: 0; transition: opacity 0.3s; }
    .gallery-item:hover .item-more { opacity: 1; }

    .content-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 2rem; padding: 0 5% 4rem 5%; max-width: 1400px; margin: 0 auto; }
    
    .main-details { background: white; padding: 2.5rem; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
    .header-info { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 2rem; border-bottom: 1px solid #f3f4f6; padding-bottom: 1.5rem; }
    .header-info h1 { font-size: 2.5rem; color: #111827; margin-bottom: 0.5rem; }
    .header-info .location { color: #6b7280; font-size: 1.2rem; display: flex; align-items: center; gap: 0.5rem; }
    .price-badge { background: linear-gradient(135deg, var(--primary-color), #2563eb); color: white; padding: 1rem 1.5rem; border-radius: 12px; font-size: 2rem; font-weight: bold; box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3); }

    .key-features { display: flex; gap: 2rem; margin-bottom: 2.5rem; flex-wrap: wrap; }
    .feature-item { display: flex; align-items: center; gap: 1rem; background: #f9fafb; padding: 1rem 1.5rem; border-radius: 12px; border: 1px solid #e5e7eb; }
    .feature-item i { font-size: 1.5rem; color: var(--primary-color); }
    .feature-item div p { margin: 0; font-size: 0.9rem; color: #6b7280; }
    .feature-item div strong { font-size: 1.2rem; color: #111827; }

    .description-section h3, .map-section h3 { font-size: 1.5rem; color: #111827; margin-bottom: 1rem; }
    .description-section p { color: #4b5563; line-height: 1.8; font-size: 1.1rem; margin-bottom: 2.5rem; white-space: pre-line; }

    .map-container { height: 350px; width: 100%; border-radius: 16px; overflow: hidden; border: 1px solid #e5e7eb; }

    .sidebar { position: sticky; top: 2rem; }
    .contact-card { background: white; padding: 2rem; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; }
    .agent-avatar { width: 100px; height: 100px; border-radius: 50%; background: #e5e7eb; margin: 0 auto 1rem auto; display: flex; align-items: center; justify-content: center; font-size: 3rem; color: #9ca3af; overflow: hidden; }
    .contact-card h3 { color: #111827; margin-bottom: 0.5rem; }
    .contact-card p { color: #6b7280; margin-bottom: 2rem; }
    .contact-btn { display: flex; align-items: center; justify-content: center; gap: 0.5rem; width: 100%; padding: 1rem; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: all 0.2s; border: none; margin-bottom: 1rem; }
    .btn-message { background: var(--primary-color); color: white; }
    .btn-message:hover { background: #1d4ed8; }
    .btn-call { background: white; color: var(--primary-color); border: 2px solid var(--primary-color); }
    .btn-call:hover { background: #eff6ff; }
  </style>
</head>
<body>
<nav>
  <a href="index.html" class="logo">NEXUS</a>
  <ul>
    <li><a href="properties.html">Πίσω στα Ακίνητα</a></li>
  </ul>
</nav>

<div id="loader" style="text-align: center; padding: 5rem; font-size: 1.5rem; color: #6b7280;">Φόρτωση δεδομένων ακινήτου...</div>
<div id="detailContent" style="display: none;"></div>

<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
  document.addEventListener('DOMContentLoaded', async () => {
    const urlParams = new URLSearchParams(window.location.search);
    const propId = urlParams.get('id');

    if (!propId) {
      window.location.href = 'properties.html';
      return;
    }

    try {
      const prop = await Api.request(`/properties/${propId}`);
      
      const contentHtml = `
        <div class="gallery-container">
            <div class="gallery-item item-main">
                <img src="https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?auto=format&fit=crop&w=1200&q=80" alt="Main View">
            </div>
            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1600607687931-ceeb5678ee2b?auto=format&fit=crop&w=600&q=80" alt="Living Room">
            </div>
            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1600566753086-00f18efc2291?auto=format&fit=crop&w=600&q=80" alt="Kitchen">
                <div class="item-more">+5 Φωτογραφίες</div>
            </div>
        </div>

        <div class="content-grid">
            <div class="main-details">
                <div class="header-info">
                    <div>
                        <h1>${prop.title}</h1>
                        <div class="location"><i class="fa-solid fa-location-dot"></i> ${prop.address}, ${prop.areaName}</div>
                    </div>
                    <div class="price-badge">€${prop.price.toLocaleString('el-GR')}</div>
                </div>

                <div class="key-features">
                    <div class="feature-item">
                        <i class="fa-solid fa-ruler-combined"></i>
                        <div><p>Εμβαδόν</p><strong>${prop.sqm} τ.μ.</strong></div>
                    </div>
                    <div class="feature-item">
                        <i class="fa-solid fa-bed"></i>
                        <div><p>Υπνοδωμάτια</p><strong>${prop.rooms}</strong></div>
                    </div>
                    <div class="feature-item">
                        <i class="fa-solid fa-bath"></i>
                        <div><p>Μπάνια</p><strong>${prop.bathrooms || 1}</strong></div>
                    </div>
                    <div class="feature-item">
                        <i class="fa-solid fa-building"></i>
                        <div><p>Όροφος</p><strong>${prop.floor === 0 ? 'Ισόγειο' : prop.floor}</strong></div>
                    </div>
                    <div class="feature-item">
                        <i class="fa-solid fa-calendar-alt"></i>
                        <div><p>Έτος Κατασκευής</p><strong>${prop.yearBuilt || '-'}</strong></div>
                    </div>
                </div>

                <div class="description-section">
                    <h3>Περιγραφή Ακινήτου</h3>
                    <p>${prop.description}</p>
                </div>

                <div class="map-section">
                    <h3>Τοποθεσία</h3>
                    <div id="propertyMap" class="map-container"></div>
                </div>
            </div>

            <div class="sidebar">
                <div class="contact-card">
                    <div class="agent-avatar">
                        <i class="fa-solid fa-user"></i>
                    </div>
                    <h3>Επικοινωνία με Ιδιοκτήτη</h3>
                    <p>Κωδικός Ακινήτου: #${prop.id}</p>
                    
                    <button class="contact-btn btn-message" onclick="alert('Το σύστημα μηνυμάτων έρχεται σύντομα!')">
                        <i class="fa-solid fa-envelope"></i> Στείλτε Μήνυμα
                    </button>
                    <button class="contact-btn btn-call" onclick="alert('Τηλέφωνο επικοινωνίας: 210-XXXXXXX')">
                        <i class="fa-solid fa-phone"></i> Προβολή Τηλεφώνου
                    </button>
                </div>
            </div>
        </div>
      `;

      document.getElementById('loader').style.display = 'none';
      const container = document.getElementById('detailContent');
      container.innerHTML = contentHtml;
      container.style.display = 'block';

      // Initialize map if lat/lng are present
      if (prop.lat && prop.lng) {
          const map = L.map('propertyMap').setView([prop.lat, prop.lng], 16);
          L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
              attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
              subdomains: 'abcd',
              maxZoom: 20
          }).addTo(map);

          L.marker([prop.lat, prop.lng]).addTo(map)
              .bindPopup(`<b>${prop.title}</b><br>${prop.areaName}`)
              .openPopup();
      } else {
          document.getElementById('propertyMap').innerHTML = '<div style="display:flex; height:100%; align-items:center; justify-content:center; color:#6b7280; background:#f9fafb;">Δεν υπάρχει ακριβής τοποθεσία στον χάρτη.</div>';
      }

    } catch (e) {
      document.getElementById('loader').innerHTML = `<span style="color: var(--danger);"><i class="fa-solid fa-triangle-exclamation"></i> Το ακίνητο δεν βρέθηκε ή διεγράφη!</span>`;
    }
  });
</script>
</body>
</html>
