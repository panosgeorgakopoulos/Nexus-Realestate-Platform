<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <title>NEXUS - Λεπτομέρειες Ακινήτου</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .detail-wrapper { max-width: 900px; margin: 3rem auto; background: white; border-radius: 8px; padding: 2rem; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .property-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 2rem; border-bottom: 1px solid #e5e7eb; padding-bottom: 1rem; }
    .price-tag { font-size: 2.5rem; color: var(--primary-color); font-weight: bold; }
    .property-features { display: flex; gap: 2rem; font-size: 1.1rem; color: #4b5563; margin-bottom: 2rem; }
  </style>
</head>
<body>
<nav>
  <a href="index.html" class="logo">NEXUS</a>
  <ul>
    <li><a href="properties.html">Πίσω στα Ακίνητα</a></li>
  </ul>
</nav>

<div class="detail-wrapper" id="detailContent">
  <h2 style="text-align: center; color: #6b7280;">Φόρτωση δεδομένων...</h2>
</div>

<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', async () => {
    // Παίρνουμε το ID από το URL (?id=...)
    const urlParams = new URLSearchParams(window.location.search);
    const propId = urlParams.get('id');

    if (!propId) {
      window.location.href = 'properties.html';
      return;
    }

    try {
      const prop = await Api.request(`/properties/${propId}`);

      document.getElementById('detailContent').innerHTML = `
        <div class="property-header">
            <div>
                <h1 style="color: #1f2937; margin-bottom: 0.5rem;">${prop.title}</h1>
                <p style="color: #6b7280; font-size: 1.2rem;">📍 ${prop.address}, ${prop.areaName}</p>
            </div>
            <div class="price-tag">€${prop.price.toLocaleString('el-GR')}</div>
        </div>

        <div class="property-features">
            <span>🏠 <strong>${prop.sqm}</strong> τ.μ.</span>
            <span>🛏️ <strong>${prop.rooms}</strong> Υπνοδωμάτια</span>
            <span>🏢 Όροφος: <strong>${prop.floor === 0 ? 'Ισόγειο' : prop.floor}</strong></span>
            <span>📅 Έτος: <strong>${prop.yearBuilt}</strong></span>
        </div>

        <h3 style="margin-bottom: 1rem;">Περιγραφή</h3>
        <p style="line-height: 1.8; color: #374151; white-space: pre-wrap; margin-bottom: 2rem;">${prop.description}</p>

        <div style="background: #f9fafb; padding: 1.5rem; border-radius: 8px; text-align: center;">
            <p style="margin-bottom: 1rem; color: #4b5563;">Ενδιαφέρεστε για αυτό το ακίνητο;</p>
            <button class="btn-primary" onclick="alert('Το σύστημα μηνυμάτων έρχεται σύντομα!')" style="font-size: 1.1rem; padding: 0.8rem 2rem;">
                ✉️ Επικοινωνία με Ιδιοκτήτη
            </button>
        </div>
      `;
    } catch (e) {
      document.getElementById('detailContent').innerHTML = `
        <h2 style="color: var(--danger); text-align: center;">Το ακίνητο δεν βρέθηκε ή διεγράφη!</h2>
      `;
    }
  });
</script>
</body>
</html>
